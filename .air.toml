#:schema https://json.schemastore.org/any.json

env_files = ["./.env"]
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
# Just "go build" isn't enough; point it to your main file
cmd = "go build -o ./tmp/main ./cmd/api/main.go"

# This is the binary created by the command above
bin = "./tmp/main"

# Watch these directories
include_dir = ["cmd", "internal"]

# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html", "sql"]

# Ignore these
exclude_dir = ["assets", "tmp", "vendor", "test"]
delay = 1000
entrypoint = ["./tmp/main"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
ignore_dangerous_root_dir = false
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
app_port = 0
app_start_timeout = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
